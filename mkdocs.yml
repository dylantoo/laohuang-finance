# 老H学金融 — MkDocs Material 配置
site_name: 老H学金融
site_description: 老黄的专属金融学知识库 — 主线龙头战法 · 交易心理学 · 宏观周期
site_author: 老黄
site_url: https://laohuang-finance.github.io

repo_url: https://github.com/laohuang-finance/laohuang-finance.github.io
repo_name: 老H学金融

# 深色金融风主题
theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换亮色模式
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换暗色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.path
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

# 插件
plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      height: auto
      width: auto
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  # - static-i18n:  # 暂时禁用，需要时再安装
  #     default_language: zh

# Markdown 扩展
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
      title: 目录

