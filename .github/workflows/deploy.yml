name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocs-glightbox mkdocs-git-revision-date-localized-plugin

      - name: Convert Obsidian wikilinks
        run: python3 scripts/pre-build.py

      - name: Build site
        run: mkdocs build --clean

      - name: Cleanup build docs
        if: always()
        run: python3 scripts/pre-build.py cleanup

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
